        <style>
        .btn-outline {
            border: 1px solid #D2006E;
        }

        .btn-outline:hover {
            border: 1px solid #D2006E;
        }

        .btn-outline:focus-visible {
            border: 1px solid #343a40;
        }

        .btn-reveal-colors {
            color: #D2006E;
            background: transparent;
        }

        .btn-reveal-colors:hover,
        .btn-reveal-colors:focus-visible {
            color: #fff;
            background: #D2006E;
            box-shadow: 0 6px 16px rgba(210, 0, 110, .25)
        }

        .btn-reveal.btn-reveal-dropdown {
            flex-direction: row;
            justify-content: flex-start;
            max-width: 36px;
            height: 34px;
            padding: 4px 10px;
            border-radius: 999px;
            gap: 0;
        }

        .btn-reveal.btn-reveal-dropdown:hover,
        .btn-group.show>.btn-reveal.btn-reveal-dropdown {
            max-width: 220px;
            gap: 8px;
            padding: 4px 15px;
        }

        .btn-reveal.btn-reveal-dropdown::after {
            opacity: 0;
            transition: opacity 0.2s ease;
            margin-left: auto;
        }

        .btn-reveal.btn-reveal-dropdown:hover::after,
        .btn-group.show>.btn-reveal.btn-reveal-dropdown::after {
            opacity: 1;
        }

        .btn-slot {
            display: inline-flex;
            justify-content: center;
            align-items: center
        }

        .btn-reveal {
            --accent: #D2006E;
            display: inline-flex;
            align-items: center;
            height: 38px;
            padding: 10px;
            border: 0;
            background: transparent;
            color: var(--accent);
            border-radius: 999px;
            max-width: 42px;
            overflow: hidden;
            white-space: nowrap;
            gap: 0;
            transition: max-width .25s ease, background-color .2s ease, color .2s ease, box-shadow .2s ease, padding .25s ease, gap .25s ease
        }

        .btn-reveal svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            flex: 0 0 auto
        }

        .btn-reveal .label {
            font-weight: 600;
            opacity: 0;
            max-width: 0;
            overflow: hidden;
            transition: opacity .18s ease, max-width .25s ease
        }

        .btn-reveal:hover,
        .btn-reveal:focus-visible {
            max-width: 180px;
            padding: 8px 12px;
            gap: 10px;
            justify-content: flex-start;
            background: var(--accent);
            color: #fff;
            box-shadow: 0 6px 16px rgba(210, 0, 110, .25)
        }

        .btn-reveal:focus-visible {
            outline: 3px solid rgba(210, 0, 110, .28);
            outline-offset: 2px
        }

        .btn-reveal:hover .label,
        .btn-reveal:focus-visible .label {
            opacity: 1;
            max-width: 160px
        }
    </style>

        .sidebar-dominios {

        <!-- Estilos del modal Agregar Término (usados por ModalNuevoTermino React) -->
        <style>
        :root {
            --modal-width: 900px;
            --modal-height: 82vh;
            --accent: #d1006c;
        }

        .modal-noscroll .modal-dialog {
            max-width: var(--modal-width);
        }

        .modal-noscroll .modal-content {
            height: var(--modal-height);
            display: flex;
            flex-direction: column;
        }

        .modal-noscroll .modal-header,
        .modal-noscroll .modal-footer {
            flex: 0 0 auto;
        }

        .modal-noscroll .modal-body {
            flex: 1 1 auto;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .attr-form {
            padding: 4px 8px;
        }

        .attr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .attr-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 12px 12px 8px;
            background: #fff;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.06);
        }

        .attr-card__header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot--pink   { background: #d1006c; }
        .dot--blue   { background: #2563eb; }
        .dot--green  { background: #0f766e; }
        .dot--orange { background: #f59e0b; }

        #modalAtributo .modal-dialog  { max-width: 960px; }

        #modalAtributo .modal-content {
            max-height: 78vh;
            display: flex;
            flex-direction: column;
        }

        #modalAtributo .modal-body {
            flex: 1 1 auto;
            overflow-y: auto;
        }

        #glosario-layout-container .search-sm { position: relative; }
        #glosario-layout-container #glosario-search { padding-right: 2rem; }

        #glosario-layout-container #glosario-buscar {
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border-radius: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        #glosario-layout-container .autocomplete-items {
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            z-index: 1000;
        }
    </style>
