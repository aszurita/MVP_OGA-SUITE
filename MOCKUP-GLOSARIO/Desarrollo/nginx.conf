server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Ocultar versión de nginx
    server_tokens off;

    # Compresión gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Cache agresivo para assets con hash (JS/CSS compilados por Vite)
    location ~* \.(js|css|png|jpg|gif|svg|woff2|ico|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html nunca cacheado — para que nuevos deploys se noten de inmediato
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Fallback SPA — todas las rutas van a index.html para que React Router las maneje
    location / {
        try_files $uri $uri/ /index.html;
    }
}
