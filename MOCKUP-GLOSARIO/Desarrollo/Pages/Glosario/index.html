    /* Estilos de la barra de navegación del ASPX — incluidos aquí para standalone */
    body {
      overflow-x: hidden;
    }

    /* Color primario Bootstrap mapeado al magenta de OGA */
    :root {
      --accent: #D2006E;
    }

    .btn-primary,
    .badge-primary {
      background-color: #D2006E !important;
      border-color: #D2006E !important;
    }

    .btn-outline-primary {
      color: #D2006E !important;
      border-color: #D2006E !important;
    }

    .btn-outline-primary:hover,
    .btn-outline-primary.active {
      background-color: #D2006E !important;
      color: #fff !important;
    }

    .text-primary {
      color: #D2006E !important;
    }

    /* Contenedor principal cuando no hay nav de OGA Suite */
    #root {
      padding: 20px;
      max-width: 1600px;
      margin: 0 auto;
    }
  </style>
