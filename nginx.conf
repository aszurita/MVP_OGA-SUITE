server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Compresión gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Proxy hacia la API backend ─────────────────────────────────────────
    # El frontend llama a /api/query, /api/insert, /api/update
    # Nginx lo enruta internamente al contenedor "api" en el puerto 8510
    location /api/ {
        proxy_pass         http://api:8510/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── SPA fallback: React Router ─────────────────────────────────────────
    # Todas las rutas (/glosario, /politicas-procedimientos) van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache agresiva para assets estáticos ──────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Health check endpoint ─────────────────────────────────────────────
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
        access_log off;
    }
}
